groups:
  - name: express_reliability_platform
    rules:
      - alert: NodeApiDown
        expr: up{job="node-api"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Node API is down"
          description: "The Node API target has been unreachable for more than 30 seconds."

      - alert: FlaskApiDown
        expr: up{job="flask-api"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Flask API is down"
          description: "The Flask API target has been unreachable for more than 30 seconds."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p95 request latency"
          description: "The 95th percentile response time has exceeded 500ms for more than 2 minutes."