version: '3.8'
services:
  node-api:
    build: ./apps/node-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
  flask-api:
    build: ./apps/flask-api
    ports:
      - "5050:5000"
  web-ui:
    build: ./apps/web-ui
    ports:
      - "8080:80"
    depends_on:
      - node-api
      - flask-api
  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus